name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build plugin zip
        run: bash bin/build-zip.sh "$GITHUB_REF_NAME"
      - name: github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --prerelease --generate-notes dist/kilden.zip
